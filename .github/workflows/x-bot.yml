name: X Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "7 5 * * *"
    - cron: "*/5 * * * *"

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Plan daily schedule
        if: github.event.schedule == '7 5 * * *' || github.event_name == 'workflow_dispatch'
        run: npm run dev:plan
        env: &bot-env
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          EMBEDDING_MODEL: ${{ secrets.EMBEDDING_MODEL }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          WEBSITE_URL: ${{ vars.WEBSITE_URL }}
          X_PROFILE_URL: ${{ vars.X_PROFILE_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_AUTH_TOKEN: ${{ secrets.DATABASE_AUTH_TOKEN }}
          BOT_TIMEZONE: ${{ vars.BOT_TIMEZONE }}
          POST_WINDOW_START_HOUR: ${{ vars.POST_WINDOW_START_HOUR }}
          POST_WINDOW_END_HOUR: ${{ vars.POST_WINDOW_END_HOUR }}
          DAILY_POST_MIN: ${{ vars.DAILY_POST_MIN }}
          DAILY_POST_MAX: ${{ vars.DAILY_POST_MAX }}
          MIN_GAP_MINUTES: ${{ vars.MIN_GAP_MINUTES }}
          MAX_GAP_MINUTES: ${{ vars.MAX_GAP_MINUTES }}
          RANDOM_JITTER_MINUTES: ${{ vars.RANDOM_JITTER_MINUTES }}
          MAX_RETRY_ATTEMPTS: ${{ vars.MAX_RETRY_ATTEMPTS }}
          CIRCUIT_BREAKER_FAILURE_THRESHOLD: ${{ vars.CIRCUIT_BREAKER_FAILURE_THRESHOLD }}
          LOOKBACK_POST_LIMIT: ${{ vars.LOOKBACK_POST_LIMIT }}
          LANGUAGE_STRATEGY: ${{ vars.LANGUAGE_STRATEGY }}
          ENABLE_SEMANTIC_DEDUP: ${{ vars.ENABLE_SEMANTIC_DEDUP }}
          KEYWORD_SIMILARITY_THRESHOLD: ${{ vars.KEYWORD_SIMILARITY_THRESHOLD }}
          SEMANTIC_SIMILARITY_THRESHOLD: ${{ vars.SEMANTIC_SIMILARITY_THRESHOLD }}
          CONTENT_HARD_BLOCK_TERMS: ${{ vars.CONTENT_HARD_BLOCK_TERMS }}
          TOPIC_WEIGHTS: ${{ vars.TOPIC_WEIGHTS }}
          TONE_POOL: ${{ vars.TONE_POOL }}
          ANGLE_POOL: ${{ vars.ANGLE_POOL }}
          DRY_RUN: ${{ vars.DRY_RUN }}

      - name: Run due posts
        if: github.event.schedule == '*/5 * * * *' || github.event_name == 'workflow_dispatch'
        run: npm run dev:once
        env: *bot-env

      - name: Commit updated local state
        if: always()
        run: |
          git config user.name "x-growth-bot"
          git config user.email "bot@example.com"
          git add data/bot.db
          git diff --cached --quiet || git commit -m "chore: update bot state"
          git pull --rebase origin "${GITHUB_REF_NAME}" || true
          git push origin "HEAD:${GITHUB_REF_NAME}" || true
